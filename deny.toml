# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# for the full reference.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
# `getrandom` (transitive via uuid → tower-http) pulls both wasip2 and
# wasip3 wasi runtime crates, each with its own `wit-bindgen`. They are
# only compiled for wasm32 targets we don't ship, but Cargo still
# resolves them. Skip the duplicate-version warning.
skip = [
    { name = "wit-bindgen" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
