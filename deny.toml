# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# for the full reference.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # sqlx 0.8.0 (postgres feature) pulls in rustls 0.21 which brings older
    # transitive deps. All items below are in the sqlx → sqlx-core dep chain;
    # we cannot upgrade them without a new sqlx major that migrates to rustls 0.23+.

    # RUSTSEC-2024-0363: Binary protocol misinterpretation in sqlx via
    # truncating casts on values > 4 GiB. Our postgres adapter only ever
    # writes bounded, internally-generated payloads (IDs, short strings,
    # nanosecond timestamps). No user-supplied value can reach 4 GiB.
    { id = "RUSTSEC-2024-0363" },

    # RUSTSEC-2024-0436: paste crate is unmaintained (archived upstream).
    # Used solely by sqlx-core as a proc-macro helper; not in our own code.
    # No vulnerability disclosed — only a maintenance concern.
    { id = "RUSTSEC-2024-0436" },

    # RUSTSEC-2025-0134: rustls-pemfile is unmaintained (archived upstream).
    # Used by sqlx-core for PEM parsing; the new API lives in rustls-pki-types.
    # No vulnerability disclosed — only a maintenance concern.
    { id = "RUSTSEC-2025-0134" },

    # RUSTSEC-2026-0098, 0099, 0104: rustls-webpki 0.101.7 TLS cert-validation
    # bugs. These are reachable only after signature verification and require
    # mis-issued CA certificates to exploit. The fixed version (>= 0.103.12)
    # requires rustls 0.23+ which sqlx 0.8 does not yet consume. Tracked:
    # upgrade sqlx when a 0.8.x patch that uses rustls 0.23 is released.
    { id = "RUSTSEC-2026-0098" },
    { id = "RUSTSEC-2026-0099" },
    { id = "RUSTSEC-2026-0104" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
# `getrandom` (transitive via uuid → tower-http) pulls both wasip2 and
# wasip3 wasi runtime crates, each with its own `wit-bindgen`. They are
# only compiled for wasm32 targets we don't ship, but Cargo still
# resolves them. Skip the duplicate-version warning.
skip = [
    { name = "wit-bindgen" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    # Added for tower_governor dependencies:
    "Zlib",  # foldhash — OSI-approved permissive license
    "ISC",   # forwarded-header-value — OSI-approved permissive license
    # Added for sqlx (postgres feature) → sqlx-core → webpki-roots:
    "MPL-2.0",  # webpki-roots — Mozilla Public License 2.0; copyleft applies
                # only to modifications of the file itself, not to linking.
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
