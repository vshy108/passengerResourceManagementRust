name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (--features http)
        # FIX: match local dev gate — pedantic catches doc/style issues
        # that -D warnings alone misses, preventing CI/local divergence.
        run: cargo clippy --all-targets --features http -- -D warnings -W clippy::pedantic
      - name: nextest (default features)
        run: cargo nextest run
      - name: nextest (--features http)
        run: cargo nextest run --features http
      - name: coverage
        run: |
          cargo llvm-cov nextest --features http \
            --ignore-filename-regex 'src/bin/' \
            --fail-under-lines 98

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo deny
        # --all-features so the audit covers the http dep tree too.
        run: cargo deny --all-features check advisories bans licenses sources

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # FIX: use .nvmrc (22.12) — Vite 7 requires Node >=20.19 or >=22.12.
          # node-version: "20" was too old and caused Vite config load failures.
          node-version-file: "web/.nvmrc"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
