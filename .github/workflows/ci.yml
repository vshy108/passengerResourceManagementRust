name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (--features http)
        # FIX: match local dev gate — pedantic catches doc/style issues
        # that -D warnings alone misses, preventing CI/local divergence.
        run: cargo clippy --all-targets --features http -- -D warnings -W clippy::pedantic
      - name: nextest (default features)
        run: cargo nextest run
      - name: nextest (--features http)
        run: cargo nextest run --features http
      - name: coverage
        run: |
          cargo llvm-cov nextest --features http \
            --ignore-filename-regex 'src/bin/|sqlite_event_store' \
            --fail-under-lines 93

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo deny
        # --all-features so the audit covers the http dep tree too.
        run: cargo deny --all-features check advisories bans licenses sources

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # FIX: use .nvmrc (22.12) — Vite 7 requires Node >=20.19 or >=22.12.
          # node-version: "20" was too old and caused Vite config load failures.
          node-version-file: "web/.nvmrc"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build release binary
        run: cargo build --release --features http --bin serve
      - name: start PRMS server
        run: |
          PRMS_API_KEYS='cl-aria-e2e-token:cl-aria,ps-001-token:ps-001' \
          PRMS_ENABLE_RESET=true \
          ./target/release/serve &
          # Wait until the health endpoint responds.
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8080/health && break || sleep 1
          done
      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: install dependencies
        working-directory: web
        run: npm ci
      - name: install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: run E2E tests
        working-directory: web
        run: npm run test:e2e
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
