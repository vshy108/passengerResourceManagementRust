name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Opt into Node.js 24 for all actions now — Node 20 actions are deprecated
  # and will be forcibly migrated on June 2, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (--features http)
        # FIX: match local dev gate — pedantic catches doc/style issues
        # that -D warnings alone misses, preventing CI/local divergence.
        run: cargo clippy --all-targets --features http -- -D warnings -W clippy::pedantic
      - name: nextest (default features)
        run: cargo nextest run
      - name: nextest (all features)
        # FIX: default-feature test discovery reports HTTP/SQLite integration
        # targets as 0-test binaries because their tests are feature-gated.
        # Run all features explicitly so CI exercises those targets instead of
        # relying on coverage as the only feature-enabled test pass.
        run: cargo nextest run --all-features
      - name: coverage
        # Coverage keeps the HTTP feature enabled because the public adapter is
        # part of the measured review surface.
        run: |
          cargo llvm-cov nextest --features http \
            --ignore-filename-regex 'src/bin/' \
            --fail-under-lines 96

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo deny
        # --all-features so the audit covers the http dep tree too.
        run: cargo deny --all-features check advisories bans licenses sources

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: install dependencies
        run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build release binary
        run: cargo build --release --features http --bin serve
      - name: start PRMS server
        run: |
          PRMS_API_KEYS='cl-aria-e2e-token:cl-aria,cl-aria:cl-aria,ps-001:ps-001' \
          PRMS_ENABLE_RESET=true \
          PRMS_ENABLE_RATE_LIMIT=false \
          ./target/release/serve &
          # Wait until the health endpoint responds.
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8080/health && break || sleep 1
          done
      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: install dependencies
        working-directory: web
        run: npm ci
      - name: get Playwright version
        id: pw-version
        working-directory: web
        # FIX: key the cache on the exact @playwright/test version rather than
        # the full package-lock.json hash. hashFiles('package-lock.json') changes
        # whenever ANY package changes, causing a cache miss even when Playwright
        # itself hasn't changed. Reading the version from the installed
        # node_modules (after npm ci) gives a stable, semantically correct key.
        run: |
          VER=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
      - name: cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - name: install Playwright system dependencies
        working-directory: web
        # FIX: always install OS-level packages (libglib, libnss, etc.) that
        # Chromium needs — these are not cached with the browser binary.
        run: npx playwright install-deps chromium
      - name: install Playwright browsers
        working-directory: web
        if: steps.pw-cache.outputs.cache-hit != 'true'
        # --with-deps omitted: system deps are handled by the step above.
        run: npx playwright install chromium
      - name: run E2E tests
        working-directory: web
        run: npm run test:e2e
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
