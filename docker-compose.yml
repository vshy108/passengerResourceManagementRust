services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: prms
      POSTGRES_PASSWORD: prms
      POSTGRES_DB: prms
    volumes:
      - prms-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prms"]
      interval: 5s
      timeout: 3s
      retries: 10

  prms:
    build:
      context: .
      dockerfile: Dockerfile
    image: prms:latest
    # FIX: bind to 127.0.0.1 only — Caddy is the sole external entry point.
    # Exposing 8080 directly to the host bypasses TLS/reverse-proxy handling.
    # Remove this ports block entirely in production; keep for local dev only.
    # Override PRMS_HOST_PORT (default 8080) when the port is already in use locally.
    ports:
      - "127.0.0.1:${PRMS_HOST_PORT:-8080}:8080"
    environment:
      # FIX: demo bearer tokens in compose make accidental public deployments
      # authenticate with known credentials. Require operator-supplied tokens.
      PRMS_API_KEYS: "${PRMS_API_KEYS:?Set PRMS_API_KEYS to comma-separated token:actor-id pairs}"
      # FIX: open CORS defaults are fine for local cargo runs, but compose is
      # the production path. Require an explicit HTTPS origin before startup.
      PRMS_CORS_ORIGINS: "${PRMS_CORS_ORIGINS:?Set PRMS_CORS_ORIGINS to https://your.domain}"
      # PostgreSQL is the default persistence backend when running via compose.
      # To use SQLite instead, remove PRMS_PG_URL and set PRMS_DB_PATH=/data/prms.db
      # (and add `volumes: [prms-data:/data]` to this service).
      PRMS_PG_URL: postgres://prms:prms@postgres:5432/prms?sslmode=disable
      PRMS_ENABLE_RATE_LIMIT: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    environment:
      # FIX: defaulting to localhost silently disables the intended public TLS
      # posture. Require the real hostname for compose deployments.
      PRMS_DOMAIN: "${PRMS_DOMAIN:?Set PRMS_DOMAIN to your public hostname}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - prms

volumes:
  caddy-data:
  caddy-config:
  prms-db:
